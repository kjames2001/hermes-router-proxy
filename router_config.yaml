classifier:
  model: ministral-3:3b
  base_url: https://ollama.com/v1
  api_key_env: OLLAMA_API_KEY
  surrogate:
    enabled: true
    path: .router/surrogate
    confidence_threshold: 0.85
  profile_hint: "james is an ai agent who prefers clean, separated pull requests and\
    \ tests code locally before submitting it upstream. he communicates directly and\
    \ pragmatically in a mix of chinese and english, often addressing me as \u8001\
    \u8D3E/jarvis. key tools include fast whisper for speech recognition, docker hub\
    \ (kjames2001), and two youtube shorts channels with specific video dimensions\
    \ and settings. his communication style is direct and human-oriented, avoiding\
    \ fabrication on metrics or data."
  system_prompt: "Classify as \"simple\" or \"complex\".\n\n\"Hello\" \u2192 simple\n\
    \"Implement OAuth2\" \u2192 complex\n\"Thanks!\" \u2192 simple\n\"Debug nginx\
    \ 502\" \u2192 complex\n\"What is Docker?\" \u2192 simple\n\"Deploy K8s cluster\"\
    \ \u2192 complex\n\"Say hi\" \u2192 simple\n\"Write integration tests\" \u2192\
    \ complex\n\"Refactor to async\" \u2192 complex\n\nSIMPLE = hi, thanks, what is,\
    \ how are you, trivia, status check.\nCOMPLEX = implement, debug, deploy, refactor,\
    \ build, configure, code, write, create.\n\n\"{message}\" \u2192\n"
  session_timeout_minutes: 5
models:
  simple:
    model: deepseek-v4-flash
    base_url: https://ollama.com/v1
    api_key_env: OLLAMA_API_KEY_2
    alternate_key_env: OLLAMA_API_KEY
    timeout_seconds: 120
    fallback_model: kimi-k2.6
    fallback_base_url: https://ollama.com/v1
    fallback_key_env: OLLAMA_API_KEY_2
    fallback2_model: big-pickle
    fallback2_base_url: https://opencode.ai/zen/v1
    fallback2_key_env: OPENCODE_ZEN_API_KEY
    fallback_alternate_key_env: OLLAMA_API_KEY
    fallback2_alternate_key_env: OLLAMA_API_KEY
  complex:
    model: deepseek-v4-pro
    base_url: https://ollama.com/v1
    api_key_env: OLLAMA_API_KEY
    alternate_key_env: OLLAMA_API_KEY_2
    timeout_seconds: 300
    fallback_model: glm-5.1
    fallback_base_url: https://ollama.com/v1
    fallback_key_env: OLLAMA_API_KEY_2
    fallback2_model: big-pickle
    fallback2_base_url: https://opencode.ai/zen/v1
    fallback2_key_env: OPENCODE_ZEN_API_KEY
    fallback_alternate_key_env: OLLAMA_API_KEY
    fallback2_alternate_key_env: OLLAMA_API_KEY
